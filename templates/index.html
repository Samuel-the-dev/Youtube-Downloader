<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>YT Downloader</title>
   <style>
      :root {
         --bg: #0f1117;
         --surface: #1a1d27;
         --text: #e0e0e0;
         --accent: #6c63ff;
         --accent-hover: #5a52d5;
         --success: #38b000;
         --error: #d00000;
         --border-radius: 16px;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
         font-family: 'Inter', system-ui, -apple-system, sans-serif;
         background: var(--bg);
         color: var(--text);
         min-height: 100vh;
         display: flex;
         justify-content: center;
         align-items: center;
         padding: 1.5rem;
      }

      .container {
         width: 100%;
         max-width: 520px;
      }

      .card {
         background: var(--surface);
         border-radius: var(--border-radius);
         padding: 2.5rem;
         box-shadow: 0 20px 40px rgba(0,0,0,0.5);
         backdrop-filter: blur(10px);
      }

      h1 {
         font-size: 2rem;
         font-weight: 700;
         margin-bottom: 0.25rem;
         background: linear-gradient(135deg, #a78bfa, #6c63ff);
         -webkit-background-clip: text;
         -webkit-text-fill-color: transparent;
         background-clip: text;
      }

      .subtitle {
         font-size: 0.95rem;
         color: #9ca3af;
         margin-bottom: 2rem;
      }

      .flash {
         padding: 0.8rem 1rem;
         border-radius: 10px;
         margin-bottom: 1.5rem;
         font-size: 0.9rem;
         display: flex;
         align-items: center;
         gap: 0.5rem;
         animation: slideIn 0.3s ease;
      }
      .flash::before { font-size: 1.2rem; }
      .flash.error { background: rgba(208,0,0,0.15); color: #ff4d4d; border: 1px solid rgba(208,0,0,0.3); }
      .flash.error::before { content: "⚠️"; }
      .flash.success { background: rgba(56,176,0,0.15); color: #6fdc6f; border: 1px solid rgba(56,176,0,0.3); }
      .flash.success::before { content: "✅"; }

      @keyframes slideIn {
         from { opacity: 0; transform: translateY(-10px); }
         to { opacity: 1; transform: translateY(0); }
      }

      .form-group {
         margin-bottom: 1.25rem;
      }

      label {
         display: block;
         font-weight: 600;
         font-size: 0.9rem;
         margin-bottom: 0.4rem;
         color: #b0b8c1;
      }

      input[type="text"],
      select {
         width: 100%;
         padding: 0.9rem 1rem;
         background: #252834;
         border: 1px solid #333a47;
         border-radius: 12px;
         color: #e0e0e0;
         font-size: 1rem;
         outline: none;
         transition: border 0.2s, box-shadow 0.2s;
      }
      input[type="text"]:focus,
      select:focus {
         border-color: var(--accent);
         box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
      }

      .checkbox-group {
         display: flex;
         align-items: center;
         gap: 0.6rem;
         background: #252834;
         padding: 0.8rem 1rem;
         border-radius: 12px;
         border: 1px solid #333a47;
         transition: border 0.2s;
      }
      .checkbox-group:hover {
         border-color: var(--accent-hover);
      }
      .checkbox-group input[type="checkbox"] {
         width: 1.2rem;
         height: 1.2rem;
         accent-color: var(--accent);
         margin: 0;
      }
      .checkbox-group label {
         margin-bottom: 0;
         cursor: pointer;
         color: #d0d5dd;
         font-weight: 500;
      }

      button {
         width: 100%;
         padding: 1rem;
         background: var(--accent);
         color: white;
         border: none;
         border-radius: 12px;
         font-size: 1.1rem;
         font-weight: 600;
         cursor: pointer;
         transition: background 0.2s, transform 0.1s;
         margin-top: 0.5rem;
      }
      button:hover { background: var(--accent-hover); }
      button:active { transform: scale(0.98); }

      .footer-link {
         display: inline-block;
         margin-top: 1.5rem;
         color: #6c63ff;
         text-decoration: none;
         font-size: 0.9rem;
         transition: color 0.2s;
      }
      .footer-link:hover { color: #a78bfa; }

      @media (max-width: 480px) {
         .card { padding: 1.8rem; }
      }
   </style>
</head>
<body>
   <div class="container">
      <div class="card">
         <h1>⬇️ TubeFetch</h1>
         <p class="subtitle">Download videos or playlists privately.</p>

         {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
               {% for category, message in messages %}
               <div class="flash {{ category }}">{{ message }}</div>
               {% endfor %}
            {% endif %}
         {% endwith %}

         <form action="/download" method="post">
               <div class="form-group">
                  <label for="url">YouTube URL</label>
                  <input type="text" name="url" id="url"
                        placeholder="https://www.youtube.com/watch?v=..."
                        required>
               </div>

               <div class="form-group">
                  <label for="quality">Video Quality</label>
                  <select name="quality" id="quality">
                     <option value="best">✨ Best available</option>
                     <option value="1080p">1080p</option>
                     <option value="720p" selected>720p (recommended)</option>
                     <option value="480p">480p</option>
                     <option value="360p">360p</option>
                  </select>
               </div>

               <div class="checkbox-group">
                  <input type="checkbox" name="audio_only" id="audio_only" value="yes">
                  <label for="audio_only">🎵 Audio only (MP3)</label>
               </div>

               <div class="checkbox-group" style="margin-bottom: 0.5rem;">
                  <input type="checkbox" name="playlist" id="playlist" value="yes">
                  <label for="playlist">📋 Download entire playlist</label>
               </div>

               <button type="submit">⬇️ Download</button>
         </form>

         <a href="{{ url_for('list_files') }}" class="footer-link">
               📂 View downloaded files on server →
         </a>
      </div>
   </div>
</body>
</html>
