<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>TubeFetch — Downloader</title>
   <style>
      :root {
         --bg: #0b0d14;
         --glass: rgba(20, 22, 30, 0.75);
         --glass-border: rgba(255, 255, 255, 0.08);
         --accent: #7c6ff7;
         --accent2: #a78bfa;
         --text: #f1f5f9;
         --muted: #94a3b8;
         --input-bg: rgba(0, 0, 0, 0.3);
         --radius: 20px;
      }

      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }
      body {
         font-family: 'Inter', system-ui, -apple-system, sans-serif;
         background: var(--bg);
         background-image:
               radial-gradient(ellipse at 20% 50%, rgba(124, 111, 247, 0.15) 0%, transparent 60%),
               radial-gradient(ellipse at 80% 20%, rgba(167, 139, 250, 0.1) 0%, transparent 60%);
         display: flex;
         justify-content: center;
         align-items: center;
         min-height: 100vh;
         padding: 1rem;
         color: var(--text);
      }

      .card {
         backdrop-filter: blur(24px);
         background: var(--glass);
         border: 1px solid var(--glass-border);
         border-radius: var(--radius);
         padding: 2.5rem 2rem;
         width: 100%;
         max-width: 500px;
         box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
         transition: transform 0.2s ease;
      }
      .card:hover {
         transform: translateY(-2px);
      }

      h1 {
         font-size: 2.2rem;
         font-weight: 700;
         letter-spacing: -0.5px;
         background: linear-gradient(135deg, #c4b5fd, #7c6ff7);
         -webkit-background-clip: text;
         -webkit-text-fill-color: transparent;
         margin-bottom: 0.25rem;
      }
      .subtitle {
         color: var(--muted);
         font-size: 0.9rem;
         margin-bottom: 2rem;
      }

      .form-group {
         margin-bottom: 1.2rem;
      }
      label {
         display: block;
         font-weight: 600;
         font-size: 0.85rem;
         margin-bottom: 0.4rem;
         color: #e2e8f0;
      }
      input, select {
         width: 100%;
         padding: 0.85rem 1rem;
         background: var(--input-bg);
         border: 1px solid rgba(255, 255, 255, 0.1);
         border-radius: 14px;
         color: white;
         font-size: 0.95rem;
         outline: none;
         transition: all 0.2s;
      }
      input:focus, select:focus {
         border-color: var(--accent);
         box-shadow: 0 0 0 3px rgba(124, 111, 247, 0.2);
      }

      .checkbox-group {
         display: flex;
         align-items: center;
         gap: 0.5rem;
         background: rgba(0, 0, 0, 0.2);
         padding: 0.7rem 1rem;
         border-radius: 14px;
         margin-bottom: 1rem;
         border: 1px solid transparent;
         transition: border-color 0.2s;
      }
      .checkbox-group:hover {
         border-color: rgba(255, 255, 255, 0.15);
      }
      .checkbox-group input[type="checkbox"] {
         width: 1.1rem;
         height: 1.1rem;
         accent-color: var(--accent);
      }
      .checkbox-group label {
         margin: 0;
         font-weight: 500;
         cursor: pointer;
      }

      button {
         width: 100%;
         padding: 1rem;
         background: linear-gradient(135deg, var(--accent), var(--accent2));
         border: none;
         border-radius: 14px;
         color: white;
         font-weight: 700;
         font-size: 1rem;
         cursor: pointer;
         letter-spacing: 0.3px;
         transition: all 0.25s;
         box-shadow: 0 10px 20px -5px rgba(124, 111, 247, 0.3);
      }
      button:hover {
         filter: brightness(1.1);
         box-shadow: 0 15px 25px -5px rgba(124, 111, 247, 0.45);
         transform: scale(1.02);
      }
      button:active {
         transform: scale(0.98);
      }

      .footer-link {
         display: block;
         text-align: center;
         margin-top: 1.5rem;
         color: var(--accent2);
         text-decoration: none;
         font-weight: 500;
         transition: color 0.2s;
      }
      .footer-link:hover {
         color: #d8b4fe;
         text-decoration: underline;
      }
   </style>
</head>
<body>
   <div class="card">
      <h1>⬇️ TubeFetch</h1>
      <p class="subtitle">Private, premium YouTube downloader</p>
      <form id="downloadForm">
         <div class="form-group">
               <label>🔗 YouTube URL</label>
               <input type="text" name="url" id="url" placeholder="https://www.youtube.com/watch?v=..." required>
         </div>
         <div class="form-group">
               <label>🎚️ Quality</label>
               <select name="quality" id="quality">
                  <option value="best">✨ Best available</option>
                  <option value="2160p">4K (2160p)</option>
                  <option value="1440p">1440p</option>
                  <option value="1080p">1080p</option>
                  <option value="720p" selected>720p</option>
                  <option value="480p">480p</option>
                  <option value="360p">360p</option>
               </select>
         </div>
         <div class="checkbox-group">
               <input type="checkbox" name="audio_only" id="audio_only" value="yes">
               <label for="audio_only">🎵 Audio only (MP3)</label>
         </div>
         <div class="checkbox-group">
               <input type="checkbox" name="playlist" id="playlist" value="yes">
               <label for="playlist">📋 Download entire playlist</label>
         </div>
         <button type="submit">⚡ Start Download</button>
      </form>
      <a href="/files" class="footer-link">📂 View my files</a>
   </div>
   <script>
      document.getElementById("downloadForm").addEventListener("submit", async (e) => {
         e.preventDefault();
         const formData = new FormData(e.target);
         const resp = await fetch("/download_async", { method: "POST", body: formData });
         const data = await resp.json();
         if (data.error) {
               alert("Error: " + data.error);
               return;
         }
         window.location.href = "/loading/" + data.task_id;
      });
   </script>
</body>
</html>
